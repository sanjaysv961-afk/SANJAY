<!DOCTYPE html>
<html>
<head>
    <title>Student Record Lookup System</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
            text-align: center;
        }
        h1 {
            color: #333;
        }
        .container {
            background: white;
            padding: 20px;
            margin: 30px auto;
            width: 400px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }
        input, button {
            margin: 10px;
            padding: 8px;
            width: 90%;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        #output {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h1>Student Record Lookup System</h1>

<div class="container">

    <h3>Add Student</h3>
    <input type="number" id="id" placeholder="Enter ID">
    <input type="text" id="name" placeholder="Enter Name">
    <input type="number" id="marks" placeholder="Enter Marks">
    <button onclick="addStudent()">Add Student</button>

    <h3>Search Student</h3>
    <input type="number" id="searchId" placeholder="Enter ID to Search">
    <button onclick="linearSearch()">Search</button>

    <div id="output"></div>

</div>

<script>
    let students = [];

    function addStudent() {
        let id = document.getElementById("id").value;
        let name = document.getElementById("name").value;
        let marks = document.getElementById("marks").value;

        if(id === "" || name === "" || marks === "") {
            alert("Please fill all fields");
            return;
        }

        students.push({id: id, name: name, marks: marks});
        alert("Student Added!");
    }

    function linearSearch() {
        let key = document.getElementById("searchId").value;
        let start = performance.now();
        let found = null;

        for(let i = 0; i < students.length; i++) {
            if(students[i].id == key) {
                found = students[i];
                break;
            }
        }

        let end = performance.now();
        let time = (end - start).toFixed(5);

        if(found) {
            document.getElementById("output").innerHTML =
                "Record Found! <br>" +
                "ID: " + found.id + "<br>" +
                "Name: " + found.name + "<br>" +
                "Marks: " + found.marks + "<br>" +
                "Time: " + time + " ms";
        } else {
            document.getElementById("output").innerHTML =
                "Record Not Found! <br>Time: " + time + " ms";
        }
    }
</script>

</body>
</html>
